<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Log</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f0f0f;color:#e8e4dc;font-family:'DM Mono','Courier New',monospace;padding:20px 18px 80px}
.app{max-width:430px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:18px;border-bottom:1px solid #2e2e2e;margin-bottom:24px}
h1{font-family:'DM Serif Display',Georgia,serif;font-size:28px;font-weight:400}
.date{font-size:10px;color:#6b6b6b;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
button{font-family:'DM Mono','Courier New',monospace;cursor:pointer}
#resetBtn{background:none;border:1px solid #2e2e2e;color:#6b6b6b;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:6px 10px;border-radius:4px;margin-top:6px}
.lbl{font-size:10px;color:#6b6b6b;letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px}
.card{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:12px;padding:18px;margin-bottom:24px}
.wrow{display:flex;gap:10px;align-items:center;margin-bottom:12px}
#wtInput{flex:1;background:#0f0f0f;border:1px solid #2e2e2e;border-radius:8px;color:#e8e4dc;font-family:inherit;font-size:22px;font-weight:500;padding:11px 14px;text-align:center;outline:none;-webkit-appearance:none;-moz-appearance:textfield}
#wtInput::-webkit-inner-spin-button,#wtInput::-webkit-outer-spin-button{-webkit-appearance:none}
#wtInput:focus{border-color:#c8a96e}
.unit{font-size:13px;color:#6b6b6b}
#logWtBtn{width:100%;background:#c8a96e;color:#0f0f0f;border:none;border-radius:8px;font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:13px}
#logWtBtn:active{opacity:.8}
#wList{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.wentry{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#0f0f0f;border-radius:6px;border:1px solid #2e2e2e}
.wval{font-size:15px;font-weight:500;color:#c8a96e}
.wtime{font-size:11px;color:#6b6b6b}
.wdel{background:none;border:none;color:#6b6b6b;font-size:18px;line-height:1;padding:0 4px}
#bevList{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.bev{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;-webkit-user-select:none}
.bev:active{opacity:.7}
.bev.done{opacity:.55;background:#1e1e1e;border-color:#333}
.bleft{display:flex;align-items:center;gap:12px}
.icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.water .icon{background:rgba(74,158,187,.15)}
.coffee .icon{background:rgba(139,94,60,.15)}
.tea .icon{background:rgba(122,158,90,.15)}
.bname{font-size:14px;font-weight:500}
.bmeta{font-size:11px;color:#6b6b6b;margin-top:2px}
.bright{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.btime{font-size:12px;color:#6b6b6b}
.check{width:22px;height:22px;border-radius:50%;border:1.5px solid #3a3a3a;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#0f0f0f}
.done .check{background:#6ec8b4;border-color:#6ec8b4}
.sumrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #222;font-size:12px}
.sumrow:last-of-type{border:none}
.sumlbl{color:#6b6b6b}
.sumval{font-weight:500}
.sumval.hi{color:#c8a96e}
.prog{height:3px;background:#222;border-radius:2px;margin-top:12px;overflow:hidden}
.progfill{height:100%;background:#6ec8b4;border-radius:2px;transition:width .4s}
.pct{font-size:10px;color:#6b6b6b;text-align:right;margin-top:5px}
#copyBtn{width:100%;background:none;border:1px solid #c8a96e;color:#c8a96e;border-radius:10px;font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:15px;margin-bottom:8px}
#previewBtn{width:100%;background:none;border:1px solid #2e2e2e;color:#6b6b6b;border-radius:10px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:15px;margin-bottom:8px}
#copyBtn:active,#previewBtn:active{opacity:.7}
#datBox{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:10px;padding:14px 16px;font-size:11px;color:#6ec8b4;white-space:pre;overflow-x:auto;line-height:1.8;display:none}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(10px);background:#c8a96e;color:#0f0f0f;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:500;letter-spacing:.08em;white-space:nowrap;z-index:999;pointer-events:none;opacity:0;transition:all .25s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="date" id="dateLabel"></div>
      <h1>Daily Log</h1>
    </div>
    <button id="resetBtn">Reset</button>
  </header>

  <div class="lbl">Morning Weight</div>
  <div class="card">
    <div class="wrow">
      <input type="number" id="wtInput" placeholder="000.0" step="0.1" min="0" max="999">
      <span class="unit">lbs</span>
    </div>
    <button id="logWtBtn">Log Weight</button>
    <div id="wList"></div>
  </div>

  <div class="lbl">Beverage Schedule</div>
  <div id="bevList"></div>

  <div class="lbl">Today's Summary</div>
  <div class="card" style="margin-bottom:24px">
    <div class="sumrow"><span class="sumlbl">Water</span><span class="sumval" id="sWater">0 / 5 (0 oz)</span></div>
    <div class="sumrow"><span class="sumlbl">Decaf Coffee</span><span class="sumval" id="sCoffee">0 / 1 (0 oz)</span></div>
    <div class="sumrow"><span class="sumlbl">Tea</span><span class="sumval" id="sTea">0 / 1 (0 oz)</span></div>
    <div class="sumrow"><span class="sumlbl">Total Fluid</span><span class="sumval hi" id="sTotal">0 / 80 oz</span></div>
    <div class="prog"><div class="progfill" id="pFill" style="width:0%"></div></div>
    <div class="pct" id="pPct">0% of daily target</div>
  </div>

  <div class="lbl">Vensim Export</div>
  <button id="copyBtn">Copy .dat to Clipboard</button>
  <button id="previewBtn">Preview .dat</button>
  <div id="datBox"></div>
</div>
<div class="toast" id="toast"></div>

<script>
var BEVS = [
  {id:'w1',type:'water', label:'Water',       icon:'💧',oz:12,time:'07:00',note:'1st glass'},
  {id:'w2',type:'water', label:'Water',       icon:'💧',oz:12,time:'07:00',note:'2nd glass'},
  {id:'w3',type:'water', label:'Water',       icon:'💧',oz:12,time:'08:30',note:'3rd glass'},
  {id:'w4',type:'water', label:'Water',       icon:'💧',oz:12,time:'10:00',note:'4th glass'},
  {id:'w5',type:'water', label:'Water',       icon:'💧',oz:12,time:'11:30',note:'5th glass'},
  {id:'dc',type:'coffee',label:'Decaf Coffee',icon:'☕',oz:10,time:'12:00',note:'10 oz mug'},
  {id:'t1',type:'tea',   label:'Tea',         icon:'🍵',oz:10,time:'14:30',note:'10 oz cup'}
];
var TARGET = 80;

function todayKey() {
  var d = new Date();
  return 'dl_' + d.getFullYear() + '_' + d.getMonth() + '_' + d.getDate();
}

function loadState() {
  try {
    var raw = localStorage.getItem(todayKey());
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {weights:[], logged:{}};
}

function saveState() {
  try { localStorage.setItem(todayKey(), JSON.stringify(state)); } catch(e) {}
}

var state = loadState();
var datVisible = false;
var toastTimer = null;

// Date label
document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US', {
  weekday:'long', month:'long', day:'numeric', year:'numeric'
});

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
}

function decYr(iso) {
  var d = new Date(iso);
  var y = d.getFullYear();
  var s = new Date(y, 0, 1);
  var e = new Date(y+1, 0, 1);
  return (y + (d - s) / (e - s)).toFixed(6);
}

function buildDat() {
  if (!state.weights.length) return '{ No weight entries yet }';
  var lines = ['{ Weight data — Daily Tracker }', 'Weight~lbs~'];
  for (var i = 0; i < state.weights.length; i++) {
    var w = state.weights[i];
    lines.push('\t' + decYr(w.ts) + '\t' + parseFloat(w.val).toFixed(1));
  }
  lines.push('~');
  return lines.join('\n');
}

// --- Weight ---
function renderWeights() {
  var el = document.getElementById('wList');
  if (!state.weights.length) { el.innerHTML = ''; return; }
  var html = '';
  for (var i = 0; i < state.weights.length; i++) {
    var w = state.weights[i];
    html += '<div class="wentry">' +
      '<span class="wval">' + w.val + ' lbs</span>' +
      '<span class="wtime">' + fmtTime(w.ts) + '</span>' +
      '<button class="wdel" data-idx="' + i + '">×</button>' +
      '</div>';
  }
  el.innerHTML = html;
}

document.getElementById('logWtBtn').addEventListener('click', function() {
  var input = document.getElementById('wtInput');
  var val = parseFloat(input.value);
  if (isNaN(val) || val <= 0) { showToast('Enter a valid weight'); return; }
  state.weights.push({val: val.toFixed(1), ts: new Date().toISOString()});
  saveState();
  input.value = '';
  renderWeights();
  refreshDat();
  showToast('Logged ' + val.toFixed(1) + ' lbs');
});

document.getElementById('wtInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('logWtBtn').click();
});

document.getElementById('wList').addEventListener('click', function(e) {
  var btn = e.target.closest('.wdel');
  if (!btn) return;
  var idx = parseInt(btn.getAttribute('data-idx'));
  state.weights.splice(idx, 1);
  saveState();
  renderWeights();
  refreshDat();
});

// --- Beverages ---
function renderBevs() {
  var el = document.getElementById('bevList');
  var html = '';
  for (var i = 0; i < BEVS.length; i++) {
    var b = BEVS[i];
    var done = !!state.logged[b.id];
    html += '<div class="bev ' + b.type + (done ? ' done' : '') + '" data-id="' + b.id + '">' +
      '<div class="bleft">' +
        '<div class="icon">' + b.icon + '</div>' +
        '<div><div class="bname">' + b.label + '</div>' +
        '<div class="bmeta">' + b.oz + ' oz · ' + b.note + '</div></div>' +
      '</div>' +
      '<div class="bright">' +
        '<span class="btime">' + b.time + '</span>' +
        '<div class="check">' + (done ? '✓' : '') + '</div>' +
      '</div>' +
    '</div>';
  }
  el.innerHTML = html;
}

document.getElementById('bevList').addEventListener('click', function(e) {
  var card = e.target.closest('.bev');
  if (!card) return;
  var id = card.getAttribute('data-id');
  if (state.logged[id]) {
    delete state.logged[id];
  } else {
    state.logged[id] = new Date().toISOString();
  }
  saveState();
  renderBevs();
  renderSummary();
});

// --- Summary ---
function renderSummary() {
  var w = 0, c = 0, t = 0;
  for (var i = 0; i < BEVS.length; i++) {
    var b = BEVS[i];
    if (!state.logged[b.id]) continue;
    if (b.type === 'water') w++;
    else if (b.type === 'coffee') c++;
    else if (b.type === 'tea') t++;
  }
  var oz = w*12 + c*10 + t*10;
  var pct = Math.min(100, Math.round(oz / TARGET * 100));
  document.getElementById('sWater').textContent = w + ' / 5 (' + (w*12) + ' oz)';
  document.getElementById('sCoffee').textContent = c + ' / 1 (' + (c*10) + ' oz)';
  document.getElementById('sTea').textContent = t + ' / 1 (' + (t*10) + ' oz)';
  document.getElementById('sTotal').textContent = oz + ' / ' + TARGET + ' oz';
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pPct').textContent = pct + '% of daily target';
}

// --- Export ---
function refreshDat() {
  if (datVisible) document.getElementById('datBox').textContent = buildDat();
}

document.getElementById('previewBtn').addEventListener('click', function() {
  datVisible = !datVisible;
  var box = document.getElementById('datBox');
  box.style.display = datVisible ? 'block' : 'none';
  if (datVisible) box.textContent = buildDat();
  document.getElementById('previewBtn').textContent = (datVisible ? 'Hide' : 'Preview') + ' .dat';
});

document.getElementById('copyBtn').addEventListener('click', function() {
  if (!state.weights.length) { showToast('No weight data yet'); return; }
  var txt = buildDat();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(function() {
      showToast('Copied!');
    }).catch(function() { fallbackCopy(txt); });
  } else {
    fallbackCopy(txt);
  }
});

function fallbackCopy(txt) {
  var ta = document.createElement('textarea');
  ta.value = txt;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); showToast('Copied!'); }
  catch(e) { showToast('Copy failed — try Preview instead'); }
  document.body.removeChild(ta);
}

// --- Reset ---
document.getElementById('resetBtn').addEventListener('click', function() {
  if (!confirm('Reset all entries for today?')) return;
  state = {weights:[], logged:{}};
  saveState();
  renderWeights();
  renderBevs();
  renderSummary();
  refreshDat();
  showToast('Day reset');
});

// --- Toast ---
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2200);
}

// Init
renderWeights();
renderBevs();
renderSummary();
</script>
</body>
</html>
